<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DietPlanner Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <style>
      body {
        font-family: 'Open Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
      }
    </style>
    
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface": "#1d1b18",
              "inverse-surface": "#33302c",
              "on-primary-container": "#a8e7c5",
              "on-error": "#ffffff",
              "outline-variant": "#bfc9c1",
              "surface-container": "#f3ede7",
              "surface-container-high": "#ede7e1",
              "surface": "#fff8f2",
              "surface-variant": "#e8e1db",
              "inverse-on-surface": "#f6f0ea",
              "primary-container": "#2d6a4f",
              "error": "#ba1a1a",
              "on-secondary-fixed": "#002113",
              "surface-container-highest": "#e8e1db",
              "tertiary-container": "#5f5f5d",
              "primary": "#0f5238",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "surface-bright": "#fff8f2",
              "surface-container-low": "#f9f2ec",
              "surface-dim": "#dfd9d3",
              "on-primary": "#ffffff",
              "on-tertiary-container": "#dbd9d6",
              "tertiary": "#474746",
              "on-tertiary-fixed": "#1b1c1a",

              "primary-fixed-dim": "#95d4b3",

              "surface-container-lowest": "#ffffff",
              "on-surface-variant": "#404943",
              "tertiary-fixed-dim": "#c8c6c3",
              "background": "#fff8f2",
              "outline": "#707973",
              "secondary-container": "#b0f1cc",
              "on-error-container": "#93000a",
              "secondary": "#2b694d",
              "secondary-fixed-dim": "#94d4b1",
              "surface-tint": "#2c694e",
              "tertiary-fixed": "#e4e2df",
              "on-primary-fixed": "#002114",
              "on-background": "#1d1b18",
              "inverse-primary": "#95d4b3",
              "on-secondary-fixed-variant": "#0c5136",
              "primary-fixed": "#b1f0ce",
              "on-secondary-container": "#327053",
              "on-secondary": "#ffffff",
              "on-tertiary-fixed-variant": "#474745"

          }
        }
      }

  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
